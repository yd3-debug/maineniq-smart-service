<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>HIU before service - limescale buildup and poor flow</title>
  <desc>Illustration of a Heat Interface Unit with clogged heat exchanger and reduced hot water flow before maintenance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#2b2b2b" />
      <stop offset="100%" stop-color="#3b2a2a" />
    </linearGradient>
    <linearGradient id="pipe" x1="0" x2="1">
      <stop offset="0%" stop-color="#cc3a3a" />
      <stop offset="100%" stop-color="#e06b2e" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Unit casing -->
  <rect x="120" y="80" width="560" height="340" rx="16" fill="#1f1f1f" stroke="#444" stroke-width="2"/>
  <rect x="140" y="100" width="520" height="300" rx="12" fill="#141414" stroke="#2c2c2c"/>

  <!-- Heat exchanger (scaled/clogged) -->
  <g transform="translate(170,130)">
    <rect width="320" height="240" rx="10" fill="#1b1b1b" stroke="#333"/>
    <!-- Finned tubes with scale buildup -->
    <g fill="url(#pipe)">
      <rect x="16" y="16" width="288" height="14" rx="7"/>
      <rect x="16" y="46" width="288" height="14" rx="7"/>
      <rect x="16" y="76" width="288" height="14" rx="7"/>
      <rect x="16" y="106" width="288" height="14" rx="7"/>
      <rect x="16" y="136" width="288" height="14" rx="7"/>
      <rect x="16" y="166" width="288" height="14" rx="7"/>
      <rect x="16" y="196" width="288" height="14" rx="7"/>
    </g>
    <!-- Scale deposits -->
    <g fill="#f2d16b" opacity="0.85">
      <circle cx="60" cy="23" r="6"/>
      <circle cx="120" cy="23" r="8"/>
      <circle cx="220" cy="23" r="5"/>
      <circle cx="80" cy="53" r="9"/>
      <circle cx="160" cy="53" r="7"/>
      <circle cx="250" cy="53" r="6"/>
      <circle cx="100" cy="83" r="8"/>
      <circle cx="190" cy="83" r="10"/>
      <circle cx="60" cy="113" r="7"/>
      <circle cx="210" cy="113" r="6"/>
      <circle cx="140" cy="143" r="9"/>
      <circle cx="260" cy="173" r="8"/>
      <circle cx="80" cy="203" r="7"/>
      <circle cx="200" cy="203" r="6"/>
    </g>
  </g>

  <!-- Flow indicators (weak) -->
  <g stroke="#e06b2e" stroke-width="6" stroke-linecap="round" opacity="0.7">
    <path d="M540 190 h80"/>
    <path d="M540 220 h60"/>
    <path d="M540 250 h50"/>
  </g>

  <!-- Warning icon -->
  <g transform="translate(520,320)">
    <circle cx="0" cy="0" r="26" fill="#3a1717" stroke="#cc3a3a" />
    <rect x="-3" y="-12" width="6" height="16" fill="#cc3a3a"/>
    <rect x="-3" y="8" width="6" height="6" fill="#cc3a3a"/>
  </g>

  <!-- Caption -->
  <text x="140" y="430" fill="#e0bebe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Before service: limescale buildup, reduced heat transfer, weak hot water flow</text>
</svg>
