<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>HIU after service - clean heat exchanger and optimal flow</title>
  <desc>Illustration of a Heat Interface Unit with clean heat exchanger and strong hot water flow after maintenance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#1f2a2f" />
      <stop offset="100%" stop-color="#23353a" />
    </linearGradient>
    <linearGradient id="pipe" x1="0" x2="1">
      <stop offset="0%" stop-color="#3ac78b" />
      <stop offset="100%" stop-color="#27a1d6" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Unit casing -->
  <rect x="120" y="80" width="560" height="340" rx="16" fill="#152024" stroke="#3b4a50" stroke-width="2"/>
  <rect x="140" y="100" width="520" height="300" rx="12" fill="#0f171a" stroke="#273237"/>

  <!-- Heat exchanger (clean) -->
  <g transform="translate(170,130)">
    <rect width="320" height="240" rx="10" fill="#0e1518" stroke="#2a3a40"/>
    <!-- Finned tubes clean and bright -->
    <g fill="url(#pipe)">
      <rect x="16" y="16" width="288" height="12" rx="6"/>
      <rect x="16" y="46" width="288" height="12" rx="6"/>
      <rect x="16" y="76" width="288" height="12" rx="6"/>
      <rect x="16" y="106" width="288" height="12" rx="6"/>
      <rect x="16" y="136" width="288" height="12" rx="6"/>
      <rect x="16" y="166" width="288" height="12" rx="6"/>
      <rect x="16" y="196" width="288" height="12" rx="6"/>
    </g>
  </g>

  <!-- Flow indicators (strong) -->
  <g stroke="#39c58a" stroke-width="8" stroke-linecap="round" opacity="0.95">
    <path d="M540 190 h120"/>
    <path d="M540 220 h140"/>
    <path d="M540 250 h110"/>
  </g>

  <!-- Check icon -->
  <g transform="translate(520,320)">
    <circle cx="0" cy="0" r="26" fill="#153126" stroke="#39c58a" />
    <path d="M-10 0 l8 8 l14 -16" fill="none" stroke="#39c58a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Caption -->
  <text x="140" y="430" fill="#cce9de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">After service: clean heat exchanger, efficient heat transfer, strong hot water flow</text>
</svg>
